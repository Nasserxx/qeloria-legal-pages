<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Authorization Callback — Qeloria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #4361ee 0%, #1a1a2e 100%); color: #fff; line-height: 1.6; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 720px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.08); padding: 40px; border-radius: 16px; backdrop-filter: blur(10px); }
        h1 { font-size: 28px; margin-bottom: 16px; }
        .success { color: #10b981; }
        .error { color: #fe2c55; }
        .code-box { background: #0a0e1a; border: 1px solid rgba(0,242,234,0.3); border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; font-family: 'Courier New', monospace; font-size: 14px; user-select: all; cursor: pointer; }
        .code-box:hover { background: #1a1f2e; }
        .copy-btn { display: inline-block; padding: 14px 28px; background: #00f2ea; color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 12px 8px 12px 0; }
        .copy-btn:hover { background: #10b981; }
        .copy-btn.copied { background: #10b981; color: #fff; }
        .home-btn { display: inline-block; padding: 14px 28px; background: rgba(255,255,255,0.1); color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; margin: 12px 0; }
        .step { background: rgba(0,242,234,0.1); border-left: 4px solid #00f2ea; padding: 16px; margin: 16px 0; border-radius: 4px; }
        .step-num { display: inline-block; width: 28px; height: 28px; background: #00f2ea; color: #000; border-radius: 50%; text-align: center; line-height: 28px; font-weight: 700; margin-right: 8px; }
        code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎬 TikTok Authorization Callback</h1>
            <div id="status"></div>
            <div id="content"></div>
            <a href="index.html" id="homeLink" class="home-btn">← Back to Qeloria</a>
        </div>
    </div>

    <script src="tiktok-oauth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const errorType = urlParams.get('error_type');
        const errorDescription = urlParams.get('error_description');

        const statusDiv = document.getElementById('status');
        const contentDiv = document.getElementById('content');
        const homeUrl = TikTokOAuth.getHomeUrl();
        document.getElementById('homeLink').href = homeUrl;

        function redirectHomeWithError(message, type) {
            const target = new URL(homeUrl);
            target.searchParams.set('tiktok_error', message);
            if (type) {
                target.searchParams.set('tiktok_error_type', type);
            }
            window.location.replace(target.toString());
        }

        if (error) {
            statusDiv.innerHTML = '<h2 class="error">Authorization Failed</h2>';
            const setupHelp = TikTokOAuth.describeTikTokSetupError(errorType || error).replace(/\n/g, '<br>');
            contentDiv.innerHTML = `
                <p>TikTok returned an error:</p>
                <div class="code-box"><strong>${error}</strong>${errorType ? '<br><br>type: ' + errorType : ''}${errorDescription ? '<br><br>' + errorDescription : ''}</div>
                <div class="step">${setupHelp}</div>
                <p>Redirect URI used: <code>${TikTokOAuth.getRedirectUri()}</code></p>
                <p><a href="${homeUrl}" style="color:#00f2ea;">Try again from the home page</a></p>
            `;
            console.error(TikTokOAuth.describeTikTokSetupError(errorType || error));
        } else if (code) {
            if (!TikTokOAuth.verifyState(state)) {
                redirectHomeWithError('State mismatch — possible CSRF attack. Please connect again.', 'state');
            } else {
                TikTokOAuth.saveAuthCode(code);
                statusDiv.innerHTML = '<h2 class="success">Authorization Successful</h2>';
                contentDiv.innerHTML = '<p>Returning to Qeloria…</p>';
                window.location.replace(homeUrl);
            }
        } else {
            statusDiv.innerHTML = '<h2>No Authorization Data</h2>';
            contentDiv.innerHTML = `
                <p>This page is the OAuth callback for Qeloria's TikTok integration. You should only see content here after authorizing the app on TikTok.</p>
                <p>To start, visit <a href="${homeUrl}" style="color:#00f2ea;">the home page</a> and click <strong>Connect with TikTok</strong>.</p>
                <p style="margin-top: 16px; opacity: 0.8; font-size: 14px;">Expected callback URL for this deployment: <code>${TikTokOAuth.getRedirectUri()}</code></p>
            `;
        }
    </script>
</body>
</html>
